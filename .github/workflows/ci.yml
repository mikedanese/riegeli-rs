name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Assert no protoc on PATH
        # The generated protobuf code is checked in; building and testing
        # the library must not depend on protoc. Remove any preinstalled
        # copy so the invariant is enforced, not just assumed — a runner
        # image that ships protoc would otherwise mask a regrown protoc
        # dependency.
        run: |
          while command -v protoc; do sudo rm -f "$(command -v protoc)"; done
          if command -v protoc; then
            echo "protoc still on PATH — build must not depend on it" >&2
            exit 1
          fi

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Test (all features)
        run: cargo test -p riegeli --all-features

      - name: Test (default features)
        run: cargo test -p riegeli

      - name: Test (no default features)
        run: cargo test -p riegeli --no-default-features

      - name: Build benchmarks
        run: cargo build --benches -p riegeli --all-features

      - name: Docs
        run: cargo doc -p riegeli --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings

  test-ffi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache FFI build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-ffi-${{ hashFiles('riegeli-ffi/build.rs', '**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-ffi-

      - name: Test FFI
        run: cargo test -p riegeli-ffi

  proto-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc 34.1 (checksum-pinned)
        run: |
          curl -sL https://github.com/protocolbuffers/protobuf/releases/download/v34.1/protoc-34.1-linux-x86_64.zip -o /tmp/protoc.zip
          echo "af27ea66cd26938fe48587804ca7d4817457a08350021a1c6e23a27ccc8c6904  /tmp/protoc.zip" | sha256sum -c -
          unzip -o /tmp/protoc.zip bin/protoc -d /tmp/protoc
          sudo mv /tmp/protoc/bin/protoc /usr/local/bin/protoc

      - name: Regenerate protobuf code
        run: ./scripts/regen-proto.sh

      - name: Fail on drift between .proto sources and checked-in code
        # git diff alone ignores untracked files — a future protoc emitting a
        # NEW output file would pass silently. Check the porcelain status too.
        run: |
          git diff --exit-code riegeli/src/proto_generated riegeli/proto
          if [ -n "$(git status --porcelain riegeli/src/proto_generated riegeli/proto)" ]; then
            echo "untracked or modified files after regeneration:" >&2
            git status --porcelain riegeli/src/proto_generated riegeli/proto >&2
            exit 1
          fi

  fuzz-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked --version 0.13.2

      - name: Build fuzz targets
        run: cargo fuzz build

      - name: Seed the reader corpus
        run: |
          mkdir -p fuzz/corpus/read_records
          cp riegeli/testdata/boundary/*.riegeli fuzz/corpus/read_records/

      - name: Smoke-run each target
        # Brief runs to catch immediately-reachable findings; real fuzzing
        # time is spent locally or on a dedicated runner (see fuzz/README.md).
        run: |
          cargo fuzz run read_records    -- -max_total_time=20 -max_len=262144
          cargo fuzz run transpose_decode -- -max_total_time=20
          cargo fuzz run varint          -- -max_total_time=10 -max_len=64
